<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сос и Сусанна ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

html {
  scroll-behavior: smooth;
  overflow-x: hidden;
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #1a1a1a;
  overflow-x: hidden;
}

/* VIDEO */
.video-bg {
  position: fixed;
  inset: 0;
  z-index: -10;
}
.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(245,235,220,0.45);
  z-index: -5;
}

/* SECTIONS */
section {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  perspective: 1600px;
}

/* CARD (FLIP EFFECT) */
.card {
  position: relative;
  background: rgba(255,255,255,0.92);
  padding: 70px 60px;
  border-radius: 30px;
  max-width: 700px;
  text-align: center;

  outline: 6px solid #9bbcff;
  outline-offset: 10px;

  box-shadow: 0 30px 70px rgba(0,0,0,0.2);

  transform-origin: center bottom;
  transform: rotateX(25deg) translateY(200px) scale(0.95);
  opacity: 0;
  transition: all 1s cubic-bezier(.2,.8,.2,1);
}

.card.visible {
  transform: rotateX(0deg) translateY(0) scale(1);
  opacity: 1;
}

/* FLOWERS */
.corner {
  position: absolute;
  width: 90px;
  pointer-events: none;
  z-index: 3;

  opacity: 0;
  transform: scale(0.7);
  transition: all 0.8s ease;
}

.card.visible .corner {
  opacity: 1;
  transform: scale(1);
  transition-delay: 0.3s;
}

.corner-tl { top: -30px; left: -30px; }
.corner-tr { top: -30px; right: -30px; }
.corner-bl { bottom: -30px; left: -30px; }
.corner-br { bottom: -30px; right: -30px; }

/* TEXT */
.names {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  color: #4f6fae;
}
.names span { display: block; }

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  color: #7faaff;
}

button {
  margin-top: 20px;
  padding: 15px 40px;
  border-radius: 50px;
  border: none;
  background: #9bbcff;
  color: white;
  cursor: pointer;
}

.date {
  font-size: 28px;
  color: #7faaff;
  font-family: 'Playfair Display', serif;
}

#timer {
  font-size: 26px;
  font-family: 'Playfair Display', serif;
}

/* SWIPE SHADOW */
section::after {
  content: "";
  position: absolute;
  bottom: 40px;
  width: 50%;
  height: 30px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.2), transparent);
  filter: blur(10px);
}

/* FINAL */
.final h1 {
  font-size: 90px;
  color: #7faaff;
}

/* MOBILE */
@media (max-width:600px){
  .card { padding:30px 20px; }
  .names { font-size:36px; }
}

.modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); }
.modal-content {
  background:white; margin:30% auto; padding:20px; border-radius:20px;
  width:80%; max-width:300px; text-align:center;
}
input { width:90%; margin:10px 0; padding:10px; }

</style>
</head>
<body>

<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="IMG_3309.mp4" type="video/mp4">
  </video>
</div>
<div class="video-overlay"></div>

<section>
<div class="card">
<img class="corner corner-tl" src="Floral-Blue-Frame-1.png">
<img class="corner corner-bl" src="Floral-Blue-Frame-2.png">
<img class="corner corner-br" src="Floral-Blue-Frame-3.png">
<img class="corner corner-tr" src="Floral-Blue-Frame-4.png">

<h1 class="names"><span>Сос</span><span>&</span><span>Сусанна</span></h1>
<p class="date">18.08.2026</p>
<p>Мы создаём нашу семью и будем счастливы разделить этот день с вами 💙</p>
<button id="confirmBtn">Подтвердить присутствие</button>
</div>
</section>

<section>
<div class="card">
<img class="corner corner-tl" src="Floral-Blue-Frame-1.png">
<img class="corner corner-bl" src="Floral-Blue-Frame-2.png">
<img class="corner corner-br" src="Floral-Blue-Frame-3.png">
<img class="corner corner-tr" src="Floral-Blue-Frame-4.png">

<h2>Локация</h2>
<p>Банкетный зал «На семи ветрах»</p>
<p>Саратов</p>
<button onclick="openRoute()">Маршрут</button>
</div>
</section>

<section>
<div class="card">
<img class="corner corner-tl" src="Floral-Blue-Frame-1.png">
<img class="corner corner-bl" src="Floral-Blue-Frame-2.png">
<img class="corner corner-br" src="Floral-Blue-Frame-3.png">
<img class="corner corner-tr" src="Floral-Blue-Frame-4.png">

<h2>До свадьбы осталось</h2>
<div id="timer"></div>
</div>
</section>

<section>
<div class="card">
<img class="corner corner-tl" src="Floral-Blue-Frame-1.png">
<img class="corner corner-bl" src="Floral-Blue-Frame-2.png">
<img class="corner corner-br" src="Floral-Blue-Frame-3.png">
<img class="corner corner-tr" src="Floral-Blue-Frame-4.png">

<h2>Дресс-код</h2>
<p>Без белого 🤍</p>
</div>
</section>

<section>
<div class="card final">
<img class="corner corner-tl" src="Floral-Blue-Frame-1.png">
<img class="corner corner-bl" src="Floral-Blue-Frame-2.png">
<img class="corner corner-br" src="Floral-Blue-Frame-3.png">
<img class="corner corner-tr" src="Floral-Blue-Frame-4.png">

<p>До встречи</p>
<h1>S & S</h1>
<p style="margin-top:30px;opacity:0.6;font-size:14px;">© 2026 Сос & Сусанна</p>
</div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Введите данные</h3>
<input id="firstName" placeholder="Имя">
<input id="lastName" placeholder="Фамилия">
<button id="sendBtn">Отправить</button>
</div>
</div>

<script>

/* INERTIA SCROLL */
let isScrolling = false;
const sections = document.querySelectorAll("section");
let current = 0;

function scrollToSection(index){
  if(index < 0 || index >= sections.length) return;
  isScrolling = true;
  current = index;
  sections[index].scrollIntoView({behavior:'smooth'});
  setTimeout(()=> isScrolling=false,700);
}

window.addEventListener('wheel', e=>{
  if(isScrolling) return;
  if(e.deltaY > 0) scrollToSection(current+1);
  else scrollToSection(current-1);
});

let touchStartY = 0;
window.addEventListener('touchstart', e=> touchStartY = e.touches[0].clientY);
window.addEventListener('touchend', e=>{
  let diff = touchStartY - e.changedTouches[0].clientY;
  if(Math.abs(diff) < 50) return;
  if(diff > 0) scrollToSection(current+1);
  else scrollToSection(current-1);
});

/* OBSERVER */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    const card = entry.target.querySelector('.card');
    if(entry.isIntersecting){
      card.classList.add('visible');
    }
  });
},{threshold:0.6});

sections.forEach(s=>observer.observe(s));

/* TIMER */
const targetDate = new Date('2026-08-18');
setInterval(()=>{
  const now = new Date();
  let diff = targetDate-now;
  const d = Math.floor(diff/86400000);
  const h = Math.floor(diff/3600000%24);
  const m = Math.floor(diff/60000%60);
  const s = Math.floor(diff/1000%60);
  document.getElementById('timer').innerHTML = `${d}д ${h}ч ${m}м ${s}с`;
},1000);

function openRoute(){ window.open('https://yandex.ru/maps/-/CPRav60J'); }

const modal = document.getElementById('modal');
document.getElementById('confirmBtn').onclick=()=>modal.style.display='block';

</script>

</body>
</html>
