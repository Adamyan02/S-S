<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сос и Сусанна ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #1a1a1a;
  overflow-x: hidden;
}

/* 🎬 ВИДЕО ФОН */
.video-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -10;
  overflow: hidden;
}

.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* затемнение */
.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(245,235,220,0.45);
  z-index: -5;
}

/* Секции */
section {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 60px 20px;
  background: transparent;
  opacity: 0;
  transform: translateY(60px);
  transition: 0.8s;
}

/* Карточка */
.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  padding: 60px;
  border-radius: 40px;
  max-width: 750px;
  text-align: center;
}

/* Блок с именами — черный */
.names-responsive {
  font-family: 'Playfair Display', serif;
  font-size: 72px; 
  line-height: 1.2;
  text-align: center;
  color: #1a1a1a; /* черный */
  text-shadow: 0 0 5px #00000033;
  margin: 0;
  animation: fadeIn 1s ease forwards;
}

.names-responsive span { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .names-responsive { font-size: 48px; }
}

/* Кнопки */
button {
  margin-top: 30px;
  padding: 18px 50px;
  border-radius: 60px;
  border: none;
  background: #8b5e3c;
  color: white;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-4px) scale(1.05);
}

/* Таймер */
#timer {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  margin-top: 20px;
}

.timer-segment {
  display: flex;
  flex-direction: column;
  align-items: center;
  font-weight: 600;
}

.timer-segment span.label {
  font-size: 18px;
  font-weight: 400;
  margin-top: 5px;
  color: #555;
}

/* Финальный блок */
.final h1 {
  font-size: 72px;
  font-family: 'Playfair Display', serif;
  color: #ff4d4d;
  text-shadow: 0 0 15px #ff4d4d, 0 0 30px #ff9999;
  animation: glow 2s infinite alternate;
}

.final p {
  font-size: 36px;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #ff4d4d; }
  to { text-shadow: 0 0 30px #ff4d4d; }
}

footer {
  text-align: center;
  padding: 40px;
  color: white;
}
</style>
</head>

<body>

<!-- 🎬 Видео -->
<div class="video-bg">
  <video autoplay muted loop playsinline>
    <source src="IMG_3309.mp4" type="video/mp4">
  </video>
</div>

<div class="video-overlay"></div>

<!-- Блок с именами -->
<section>
  <div class="card">
    <h1 class="names-responsive">
      <span>Сос</span><br>
      <span>&</span><br>
      <span>Сусанна</span>
    </h1>

    <p style="margin-top:20px; font-size:20px;">18.08.2026</p>
    <p style="font-size:18px;">Мы создаём нашу семью и будем счастливы разделить этот момент с вами ❤️</p>

    <button onclick="alert('Спасибо! 💙')">Подтвердить присутствие</button>
  </div>
</section>

<!-- Локация с кнопкой маршрута -->
<section>
  <div class="card">
    <h2>Локация</h2>
    <p>Банкетный зал «На семи ветрах»</p>
    <p>Саратов, Московское шоссе, 154 к1</p>
    
    <button onclick="openRoute()">Проложить маршрут</button>
  </div>
</section>

<!-- Таймер -->
<section>
  <div class="card">
    <h2>До свадьбы осталось</h2>
    <div id="timer"></div>
  </div>
</section>

<!-- Дресс-код -->
<section>
  <div class="card">
    <h2>Дресс-код</h2>
    <p>Просим воздержаться от белого цвета 🤍</p>
  </div>
</section>

<!-- Финал -->
<section>
  <div class="card final">
    <p>До встречи</p>
    <h1>S & S</h1>
  </div>
</section>

<footer>© 2026 Сос & Сусанна</footer>

<script>
/* Анимация появления */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.style.opacity = 1;
      entry.target.style.transform = 'translateY(0)';
    }
  });
});
document.querySelectorAll('section').forEach(s => observer.observe(s));

/* Таймер */
const targetDate = new Date('2026-08-18T00:00:00');

function updateTimer() {
  const now = new Date();
  let diff = targetDate - now;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor(diff / 3600000 % 24);
  const minutes = Math.floor(diff / 60000 % 60);
  const seconds = Math.floor(diff / 1000 % 60);

  const timerHTML = `
    <div class="timer-segment"><div>${days}</div><span class="label">дней</span></div>
    <div class="timer-segment"><div>${hours}</div><span class="label">часов</span></div>
    <div class="timer-segment"><div>${minutes}</div><span class="label">минут</span></div>
    <div class="timer-segment"><div>${seconds}</div><span class="label">секунд</span></div>
  `;
  document.getElementById('timer').innerHTML = timerHTML;
}

setInterval(updateTimer, 1000);
updateTimer();

/* Проложить маршрут */
function openRoute(){
  window.open("https://yandex.ru/maps/-/CPRav60J", "_blank");
}
</script>

</body>
</html>
